<div class="subform" [formGroup]="group">
  <h3>Versiones</h3>

  <div formArrayName="versions">
    <div class="version" *ngFor="let version of versions.controls; let i = index" [formGroupName]="i">
      <div class="grid">

        <!-- Marco y preview por versión -->
        <div class="image-block">
          <div class="image-frame">
            <img *ngIf="imagePreview(i) as img; else placeholder" [src]="img" alt="Vista previa de la imagen" />
            <ng-template #placeholder>
              <div class="image-placeholder">Vista previa</div>
            </ng-template>
          </div>

          <div class="image-actions">
            <label class="btn">
              <input type="file" accept="image/*" (change)="onFileSelected($event, i)" hidden />
              Subir imagen
            </label>
            <button type="button" class="btn btn--ghost" (click)="clearImage(i)" [disabled]="!imagePreview(i)">Quitar</button>
          </div>
        </div>

        <div class="field">
          <label>Nombre</label>
          <input type="text" formControlName="title" placeholder="Absolute Batman" />
        </div>

        <div class="field full">
          <label>Continuidad</label>
          <input type="text" formControlName="continuity" />
        </div>

        <div class="field full">
          <label>Primera Aparición</label>
          <input type="text" formControlName="firstAppearanceRef" />
        </div>

        <div class="field full">
          <label>Creador/es</label>
          <input type="text" formControlName="createdBy" placeholder="Scott Snyder" />
        </div>

      </div>

      <button type="button" class="remove-btn" (click)="removeVersion(i)">Eliminar</button>
      <hr />
    </div>
  </div>

  <button type="button" class="add-btn" (click)="addVersion()">Agregar versión</button>
</div>
