<div class="subform" [formGroup]="group">
  <h3>Estadísticas (1–10)</h3>
  <div class="grid">
    <div class="field" *ngFor="let s of labels">
      <label [for]="s.key">{{ s.label }}</label>
      <input
        [id]="s.key"
        type="range"
        [formControlName]="s.key"
        min="1"
        max="10"
      />
      <span class="stat-value">{{ group.get(s.key)?.value }}</span>
    </div>
  </div>
</div>
