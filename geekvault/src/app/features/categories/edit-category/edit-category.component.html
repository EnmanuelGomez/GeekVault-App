<section class="form container">
  <h2>Editar Categoría</h2>

  <div *ngIf="loading" class="state info">Cargando…</div>
  <div *ngIf="!loading && error" class="state error">{{ error }}</div>

  <form *ngIf="!loading && !error" [formGroup]="form" (ngSubmit)="onSubmit()">
    <label for="name">Nombre</label>
    <input id="name" type="text" formControlName="name" />
    <small *ngIf="name?.touched && name?.hasError('required')" style="color:#c0392b">
      El nombre es obligatorio.
    </small>
    <small *ngIf="name?.touched && name?.hasError('minlength')" style="color:#c0392b">
      Mínimo 3 caracteres.
    </small>

    <label for="description">Descripción</label>
    <textarea id="description" formControlName="description"></textarea>

    <div class="actions">
      <button type="button" class="btn secondary" [routerLink]="['/categories']">Volver</button>
      <button type="submit" class="btn primary" [disabled]="form.invalid || saving">
        {{ saving ? 'Guardando...' : 'Guardar' }}
      </button>
    </div>

    <p *ngIf="success" style="color:#1e8449; margin-top:.5rem;">{{ success }}</p>
    <p *ngIf="error" style="color:#c0392b; margin-top:.5rem;">{{ error }}</p>
  </form>
</section>
