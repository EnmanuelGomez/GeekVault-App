<a class="franchise-card"
   [routerLink]="['/franchise', franchise.id]"
   role="button"
   tabindex="0"
   title="{{ franchise.name }}">
  <div class="image-wrap">
    <img [src]="franchise.imageUrl || 'assets/placeholders/franchise-fallback.png'"
         (error)="fallback($event)"
         [alt]="franchise.name"
         loading="lazy"/>
  </div>
  <div class="name">{{ franchise.name }}</div>
</a>
